packages:
  groups:
    core:
      - git
      - gh
      - jq
      - yq
      - gitleaks
      - curl
      - ca-certificates
      - chezmoi

    shell:
      - zsh
      - antidote
      - starship
      - fzf
      - zoxide
      - carapace

    cli:
      - eza
      - bat
      - fd
      - ripgrep
      - git-delta
      - lazygit
      - btop
      - dust
      - procs
      - watch
      - pay-respects
      - mise
      - cmake
      - hyperfine
      - xh

    desktop:
      - ghostty
      - font-jetbrains-mono-nerd-font
      - obsidian
      - docker
      - docker-compose
      - lazydocker

    nvim:
      - neovim
      - tree-sitter

  overrides:
    gh:
      pacman: github-cli

    fd:
      apt: fd-find

    dust:
      apt: du-dust

    font-jetbrains-mono-nerd-font:
      darwin_kind: cask
      pacman: ttf-jetbrains-mono-nerd
      # apt's fonts-jetbrains-mono is the regular font without nerd glyphs,
      # so pull the official Nerd Font tarball into ~/.local/share/fonts.
      apt_manual: jetbrains_mono_nerd

    ghostty:
      darwin_kind: cask

    antidote:
      pacman_aur: zsh-antidote
      apt_manual: antidote_git

    tree-sitter:
      apt: tree-sitter-cli

    neovim:
      apt_manual: neovim_tarball

    pay-respects:
      darwin: timescam/homebrew-tap/pay-respects
      pacman_aur: pay-respects-bin
      apt_manual: pay_respects_release

    starship:
      apt_manual: starship_script

    mise:
      apt_manual: mise_script

    eza:
      apt_manual: eza_release

    carapace:
      pacman_aur: carapace-bin
      apt_manual: carapace_release

    lazygit:
      apt_manual: lazygit_release

    xh:
      apt_manual: xh_release

    obsidian:
      darwin_kind: cask
      pacman_aur: obsidian
      # No upstream .deb; install_apt will fail-skip on apt-based boxes.

    watch:
      # Arch ships `watch` as part of procps-ng, not a standalone package.
      pacman: procps-ng

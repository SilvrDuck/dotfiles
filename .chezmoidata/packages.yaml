packages:
  # Two MECE buckets by install policy. Every package sits in exactly one.
  #   baseline — installed on every machine, never asked.
  #   optional — opt-in per machine via scripts/pick-packages; the install gates
  #              each member on the local choices file (~/.config/dotfiles/
  #              package-choices). Unanswered / non-interactive ⇒ skipped.
  # Per-manager name/kind/skip quirks live in `overrides`, keyed by package name.
  baseline:
    core:
      - git
      - gh
      - jq
      - yq
      - gitleaks
      - curl
      - ca-certificates
      - chezmoi

    shell:
      - zsh
      - antidote
      - starship
      - fzf
      - zoxide
      - carapace

    cli:
      - eza
      - bat
      - fd
      - ripgrep
      - git-delta
      - lazygit
      - btop
      - dust
      - procs
      - watch
      - pay-respects
      - mise
      - cmake
      - hyperfine
      - xh
      - sbb-tui
      - kanban-md
      - blueutil
      - sleepwatcher

    nvim:
      - neovim
      - tree-sitter

    fonts:
      - font-jetbrains-mono-nerd-font

  # Each group is one toggle in the picker: `label` is shown to the user,
  # `packages` are real packages installed by this loop, and `upstream` are
  # curl|bash ids installed by upstream-installers.sh (gated the same way).
  optional:
    ai-tools:
      label: AI tools
      packages:
        - claude
      upstream:
        - claude-cli
        - opencode
        - pi
        - codex
    containers:
      label: Containers
      packages:
        - docker
        - docker-compose
        - lazydocker
    gui-apps:
      label: GUI apps
      packages:
        - obsidian
        - visual-studio-code
        - ghostty
    desktop-tools:
      label: Desktop & window management
      packages:
        - raycast
        # AEROSPACE-FORK #1618: brew cask disabled while running tymscar's fork.
        # Restore on merge — see .chezmoiexternals/aerospace-fork.toml.tmpl.
        # - aerospace
        - alt-tab
        - borders
        - autoraise
        - displayplacer
        - displaylink
        - im-select
        - jordanbaird-ice
        - nwg-displays
    mcp-deps:
      label: MCP deps
      packages:
        - d2
        - plantuml

  overrides:
    gh:
      pacman: github-cli

    fd:
      apt: fd-find

    dust:
      apt: du-dust

    font-jetbrains-mono-nerd-font:
      darwin_kind: cask
      pacman: ttf-jetbrains-mono-nerd
      # apt's fonts-jetbrains-mono is the regular font without nerd glyphs,
      # so pull the official Nerd Font tarball into ~/.local/share/fonts.
      apt_manual: jetbrains_mono_nerd
      # GUI-only: a nerd font is dead weight on a headless devcontainer.
      devcontainer_skip: true

    ghostty:
      darwin_kind: cask

    antidote:
      pacman_aur: zsh-antidote
      apt_manual: antidote_git

    tree-sitter:
      apt: tree-sitter-cli

    neovim:
      apt_manual: neovim_tarball

    pay-respects:
      # macOS: no working brew formula; installed via upstream-installers.sh.
      darwin_skip: true
      pacman_aur: pay-respects-bin
      apt_manual: pay_respects_release

    starship:
      apt_manual: starship_script

    mise:
      apt_manual: mise_script

    eza:
      apt_manual: eza_release

    carapace:
      pacman_aur: carapace-bin
      apt_manual: carapace_release

    lazygit:
      apt_manual: lazygit_release

    xh:
      apt_manual: xh_release

    obsidian:
      darwin_kind: cask
      pacman_aur: obsidian

    raycast:
      darwin_kind: cask
      linux_skip: true

    claude:
      darwin_kind: cask
      linux_skip: true
      # Anthropic's Claude desktop app (the cask), not the claude CLI.

    visual-studio-code:
      darwin_kind: cask
      pacman_aur: visual-studio-code-bin

    watch:
      # Arch ships `watch` as part of procps-ng, not a standalone package.
      pacman: procps-ng

    d2:
      apt_manual: d2_script

    kanban-md:
      darwin: antopolskiy/tap/kanban-md
      # Darwin-only tap; skip on devcontainers (it would only fail there).
      devcontainer_skip: true

    sbb-tui:
      darwin: necrom4/tap/sbb-tui
      pacman_aur: sbb-tui

    # AEROSPACE-FORK #1618: brew cask disabled while running tymscar's fork.
    # Restore on merge — see .chezmoiexternals/aerospace-fork.toml.tmpl.
    # aerospace:
    #   darwin: nikitabobko/tap/aerospace
    #   darwin_kind: cask

    alt-tab:
      darwin_kind: cask
      linux_skip: true

    im-select:
      # Input-source switcher CLI.
      darwin: daipeihust/tap/im-select
      linux_skip: true

    borders:
      darwin: FelixKratz/formulae/borders
      linux_skip: true
      # JankyBorders — focus-border daemon for AeroSpace.

    autoraise:
      darwin: dimentium/autoraise/autoraiseapp
      darwin_kind: cask
      linux_skip: true
      # AutoRaise — focus-follows-mouse for AeroSpace (no native equivalent).

    nwg-displays:
      # Wayland (sway/Hyprland) display GUI — no macOS build.
      darwin_skip: true

    displayplacer:
      # macOS-only CLI used by the AeroSpace new-monitor arranger LaunchAgent
      # to set a fresh external as Main + stack it above the built-in.
      linux_skip: true

    displaylink:
      # DisplayLink Manager — driver for DisplayLink docks/adapters (macOS only).
      darwin_kind: cask
      linux_skip: true

    jordanbaird-ice:
      # Ice — menu bar manager (macOS only).
      darwin_kind: cask
      linux_skip: true

    blueutil:
      # macOS Bluetooth CLI behind two features: the hotspot trigger
      # (~/.local/bin/android-hotspot) and the sleep/wake power toggle
      # (~/.local/bin/bt-sleep). Baseline on Mac; no Linux build.
      linux_skip: true

    sleepwatcher:
      # macOS sleep/wake daemon driving the Bluetooth-on-sleep LaunchAgent
      # (~/.local/bin/bt-sleep). Baseline on Mac; no Linux build.
      linux_skip: true

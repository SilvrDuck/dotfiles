claude_settings:
  permissions:
    defaultMode: auto
    allow:
      - Read(~/.claude/host-notes.md)
      - Edit(~/.claude/host-notes.md)
      - Write(~/.claude/host-notes.md)
  theme: dark
  skipAutoPermissionPrompt: true
  effortLevel: xhigh
  statusLine:
    type: command
    command: >-
      jq -r 'def p($x): if $x==null then "?" else ($x|round|tostring) end; "\(.model.display_name // "?")\(if .effort.level then " (\(.effort.level))" else "" end) · 5h \(p(.rate_limits.five_hour.used_percentage))% · 7d \(p(.rate_limits.seven_day.used_percentage))%"'
  enabledPlugins:
    frontend-design@claude-plugins-official: true
    superpowers@claude-plugins-official: true
    context7@claude-plugins-official: true
    code-review@claude-plugins-official: true
    code-simplifier@claude-plugins-official: true
    skill-creator@claude-plugins-official: false
    github@claude-plugins-official: true
    playwright@claude-plugins-official: true
    claude-md-management@claude-plugins-official: true
    typescript-lsp@claude-plugins-official: true
    security-guidance@claude-plugins-official: true
    claude-code-setup@claude-plugins-official: true
    pyright-lsp@claude-plugins-official: true
    telegram@claude-plugins-official: true
    humanizer@humanizer: true
  extraKnownMarketplaces:
    claude-plugins-official:
      source:
        source: github
        repo: anthropics/claude-plugins-official
    humanizer:
      source:
        source: github
        repo: blader/humanizer

# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input
input {
  # Use multiple keyboard layouts and switch between them
  # with Left Alt + Right Alt: kb_layout = us,dk,eu
  kb_layout = eu                                           # active layout
  kb_options = compose:caps                                # caps as compose

  repeat_rate = 40                                         # keys per second
  repeat_delay = 600                                       # ms before repeat

  numlock_by_default = true                                # numpad on at start

  # Increase sensitivity for mouse/trackpad (default: 0):
  # sensitivity = 0.35
  follow_mouse = 1                                         # focus follows mouse

  touchpad {
    # natural_scroll = true
    # clickfinger_behavior = true
    scroll_factor = 0.4                                    # touchpad scroll speed
  }
}

# Scroll nicely in the terminal.
windowrule = match:class (Alacritty|kitty|foot), scroll_touchpad 1.5
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2

# Enable touchpad gestures for changing workspaces:
# See https://wiki.hyprland.org/Configuring/Gestures/
# gesture = 3, horizontal, workspace
